name: Performance do acervo

on:
  schedule:
    # Todo dia 1, 09:00 em São Paulo (America/Sao_Paulo = UTC-3). GitHub Actions usa UTC.
    - cron: "0 12 1 * *"
  workflow_dispatch:

# Só dispara por agendamento/execução manual — o commit de volta não reaciona o
# workflow, evitando recursão de Actions. Ainda assim usamos [skip ci] na mensagem.
permissions:
  contents: write
  issues: write

concurrency:
  group: performance-acervo
  cancel-in-progress: false

jobs:
  measure-performance:
    name: Medir tempo de resposta das imagens
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Medir performance
        id: perf
        run: |
          python scripts/measure_performance.py \
            --json site/data/corpus-data-enriched.json \
            --history site/data/performance.json \
            --report acervo-performance-report.md \
            --threshold-ms 2000 \
            --top 10

      - name: Commitar histórico de performance
        run: |
          if git diff --quiet -- site/data/performance.json; then
            echo "Sem mudanças em performance.json; nada a commitar."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/data/performance.json
          git commit -m "Update acervo performance history [skip ci]"
          git push

      - name: Abrir/atualizar issue se a média ultrapassar o limite
        if: steps.perf.outputs.over_threshold == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_TITLE: "Acervo com tempo médio de carregamento acima do limite"
        run: |
          existing_issue="$(
            gh issue list \
              --state open \
              --search "$ISSUE_TITLE in:title" \
              --json number \
              --jq '.[0].number // empty'
          )"

          if [ -n "$existing_issue" ]; then
            gh issue comment "$existing_issue" --body-file acervo-performance-report.md
          else
            gh issue create --title "$ISSUE_TITLE" --body-file acervo-performance-report.md
          fi
